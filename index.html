<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador de Márgenes Agrícolas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix@1.2.0"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  font-family: Arial;
  background: #f5f7f9;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

h2 {
  color: #2e7d32;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

input, select {
  padding: 10px;
  width: 100%;
}

button {
  margin-top: 10px;
  padding: 12px;
  background: #2e7d32;
  color: white;
  border: none;
  cursor: pointer;
}

.resultado {
  margin-top: 20px;
  padding: 20px;
  background: #e8f5e9;
  border-radius: 8px;
}

canvas {
  margin-top: 25px;
}

.positivo { color: green; font-weight: bold; }
.negativo { color: red; font-weight: bold; }

</style>
</head>

<body>

<div class="container">

<h2>🌱 Simulador de Rentabilidad Agrícola</h2>
<p style="color:gray;">Análisis de márgenes por cultivo</p>

<label>Cliente</label>
<input id="cliente" placeholder="Nombre del cliente">

<div class="grid">

<select id="zona">
<option value="norte">Norte BA</option>
<option value="sur">Sur BA</option>
<option value="cordoba">Córdoba</option>
</select>

<select id="cultivo">
<option value="soja">Soja</option>
<option value="maiz">Maíz</option>
<option value="trigo">Trigo</option>
<option value="colza">Colza</option>
<option value="girasol">Girasol</option>
</select>

<select id="cultivo2">
<option value="soja">Soja</option>
<option value="maiz">Maíz</option>
<option value="trigo">Trigo</option>
<option value="colza">Colza</option>
<option value="girasol">Girasol</option>
</select>

<input type="number" id="rinde" placeholder="Rinde qq/ha">
<input type="number" id="precio" placeholder="Precio USD/tn">

</div>

<button onclick="calcular()">Calcular</button>
<button onclick="exportarPDF()">Exportar PDF</button>

<div id="resultado" class="resultado"></div>

<canvas id="lineChart"></canvas>
<canvas id="heatmap"></canvas>

<p><b>Referencia:</b> 🔴 negativo | 🟠 medio | 🟢 alto</p>

</div>

<script>

let lineChart, heatmapChart;

function obtenerCosto(zona, cultivo){
const c = {
norte:{soja:550,maiz:750,trigo:650,colza:700,girasol:600},
sur:{soja:450,maiz:650,trigo:600,colza:650,girasol:550},
cordoba:{soja:500,maiz:700,trigo:620,colza:680,girasol:580}
};
return c[zona][cultivo];
}

function calcular(){

const zona = document.getElementById("zona").value;
const cultivo = document.getElementById("cultivo").value;
const cultivo2 = document.getElementById("cultivo2").value;
const rinde = parseFloat(document.getElementById("rinde").value);
const precio = parseFloat(document.getElementById("precio").value);
const cliente = document.getElementById("cliente").value;

if(!rinde || !precio){
  alert("Completá rinde y precio");
  return;
}

const rinde_tn = rinde / 10;

const costo1 = obtenerCosto(zona,cultivo);
const costo2 = obtenerCosto(zona,cultivo2);

const margen1 = rinde_tn * precio - costo1;
const margen2 = rinde_tn * precio - costo2;

// Break-even
const breakeven1 = costo1 / rinde_tn;
const breakeven2 = costo2 / rinde_tn;

// Recomendación
let recomendacion = "";
if(margen1 > margen2){
  recomendacion = `Conviene ${cultivo.toUpperCase()} por +USD ${(margen1-margen2).toFixed(0)}/ha`;
} else {
  recomendacion = `Conviene ${cultivo2.toUpperCase()} por +USD ${(margen2-margen1).toFixed(0)}/ha`;
}

document.getElementById("resultado").innerHTML = `
<b>Cliente:</b> ${cliente || "No especificado"}<br><br>

<b>${cultivo.toUpperCase()}</b>: USD ${margen1.toFixed(0)} /ha<br>
Break-even: USD ${breakeven1.toFixed(0)} /tn<br><br>

<b>${cultivo2.toUpperCase()}</b>: USD ${margen2.toFixed(0)} /ha<br>
Break-even: USD ${breakeven2.toFixed(0)} /tn<br><br>

<b>Diferencia:</b> USD ${(margen1-margen2).toFixed(0)} /ha<br><br>

<div style="font-size:20px;" class="${margen1>margen2 ? 'positivo':'negativo'}">
✔ ${recomendacion}
</div>
`;

generarLinea(rinde_tn,precio,costo1,costo2,cultivo,cultivo2);
generarHeatmap(rinde,precio,costo1);

}

function generarLinea(rinde_tn,precio,c1,c2,cultivo,cultivo2){

const precios=[], m1=[], m2=[];

for(let p=precio*0.5;p<=precio*1.5;p+=10){
precios.push(p);
m1.push(rinde_tn*p-c1);
m2.push(rinde_tn*p-c2);
}

if(lineChart) lineChart.destroy();

lineChart = new Chart(document.getElementById("lineChart"),{
type:'line',
data:{
labels:precios,
datasets:[
{label:cultivo,data:m1},
{label:cultivo2,data:m2}
]
}
});

}

function generarHeatmap(rindeBase,precioBase,costo){

const data=[];

for(let r=rindeBase*0.7;r<=rindeBase*1.3;r+=5){
for(let p=precioBase*0.7;p<=precioBase*1.3;p+=10){
data.push({x:p,y:r,v:(r/10)*p-costo});
}
}

if(heatmapChart) heatmapChart.destroy();

heatmapChart = new Chart(document.getElementById("heatmap"),{
type:'matrix',
data:{datasets:[{
data:data,
backgroundColor:ctx=>{
const v = ctx.raw.v;
if(v<0) return 'red';
if(v<200) return 'orange';
return 'green';
}
}]}
});

}

function exportarPDF(){
html2pdf().from(document.querySelector(".container")).save("simulacion_margen.pdf");
}

</script>

</body>
</html>
